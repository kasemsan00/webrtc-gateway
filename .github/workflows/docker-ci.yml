name: Docker Image CI

on:
  push:
    branches: ["main"]
    tags: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.kasemsan.com/gateway-sip
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: registry.kasemsan.com
          username: ${{secrets.DOCKER_KASEMSAN_USERNAME}}
          password: ${{secrets.DOCKER_KASEMSAN_PASSWORD}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/gateway-sip
          file: apps/gateway-sip/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
