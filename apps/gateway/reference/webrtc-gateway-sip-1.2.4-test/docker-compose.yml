version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: k2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: k2_gateway
      POSTGRES_USER: k2user
      POSTGRES_PASSWORD: k2pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k2user -d k2_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - k2_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  k2-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: k2-gateway:latest
    container_name: k2-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    # Use bridge mode with port mapping (host mode doesn't work on Windows/Mac)
    ports:
      # SIP signaling - UDP only (TCP removed - chan_sip has connection reuse issues)
      - "5060:5060/udp"
      # HTTP/WebSocket API
      - "8080:8080/tcp"
      # RTP media (UDP port range)
      - "${RTP_PORT_MIN:-10500}-${RTP_PORT_MAX:-10600}:${RTP_PORT_MIN:-10500}-${RTP_PORT_MAX:-10600}/udp"

    # Environment variables (override .env)
    environment:
      # TURN Server
      - TURN_SERVER=${TURN_SERVER:-turn:turn.ttrs.or.th:3478?transport=udp}
      - TURN_USERNAME=${TURN_USERNAME:-turn01}
      - TURN_PASSWORD=${TURN_PASSWORD:-Test1234}

      # SIP Configuration
      - SIP_PORT=${SIP_PORT:-5060}
      - SIP_LOCAL_PORT=${SIP_LOCAL_PORT:-5090}
      - SIP_PUBLIC_IP=${SIP_PUBLIC_IP} # Optional: Public IP for NAT traversal

      # RTP Configuration
      - RTP_PORT_MIN=${RTP_PORT_MIN:-10500}
      - RTP_PORT_MAX=${RTP_PORT_MAX:-10600}

      # Database Configuration
      - DB_ENABLE=${DB_ENABLE:-true}
      - DB_DSN=postgres://k2user:k2pass@postgres:5432/k2_gateway?sslmode=disable
      - DB_STATS_INTERVAL_MS=${DB_STATS_INTERVAL_MS:-5000}
      - DB_LOG_FULL_SIP=${DB_LOG_FULL_SIP:-true}
      - DB_BATCH_SIZE=${DB_BATCH_SIZE:-100}
      - DB_BATCH_INTERVAL_MS=${DB_BATCH_INTERVAL_MS:-1000}

    networks:
      - k2_network

    # Or mount .env file directly
    # volumes:
    #   - ./.env:/app/.env:ro

    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Security options
    security_opt:
      - no-new-privileges:true

    # Read-only root filesystem (uncomment if app doesn't need write access)
    # read_only: true

    # Capabilities (drop all, add only what's needed)
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # For binding to port 5090

volumes:
  postgres_data:
    driver: local

networks:
  k2_network:
    driver: bridge
