[vrs-operator-normal-group-ttrstest]
;
; Operator normal (Dial Plan)
;

include => vrs-ext-local-structure-ttrstest
include => vrs-ext-dnd-service

;Echo test
exten => _9999,1,Answer
same => n,Echo()
same => n,Hangup

exten => _XXX!,1,set(__CANCALLOUT=TRUE)
exten => _XXX!,2,set(__OPERATOR_CALLERID=${CALLERID(num)})
exten => _XXX!,3,Set(__USER_UNIQUEID=${DB(VRS_VARIABLE/${OPERATOR_CALLERID}/user_uniqueid)})
exten => _XXX!,4,GotoIf($["${USER_UNIQUEID}" = ""]?next)
exten => _XXX!,5,Set(__USER_OUT_MAPPING=${DB(VRS_VARIABLE/${OPERATOR_CALLERID}/user_out_mapping)})
exten => _XXX!,6,Set(__USER_CALLERID_MAPPING=${DB(VRS_VARIABLE/${OPERATOR_CALLERID}/user_id)})
exten => _XXX!,7,Set(USER_CALL_TYPE=${DB(VRS_VARIABLE/${OPERATOR_CALLERID}/user_call_type)})
exten => _XXX!,8,Set(__USER_CALLERID_ALL=${IF($["${USER_CALL_TYPE}" = "MAKING" | "${USER_CALL_TYPE}" = "VRI"]?"'VRS Call' <${AGENT_CALLER_NUM_DEFAULT}>")})
exten => _XXX!,9,GotoIf($["${USER_CALLERID_ALL}" = ""]?check_next:next)
exten => _XXX!,10(check_next),Set(__USER_CALLERID_ALL=${IF($["${USER_CALL_TYPE}" = "RECEIVING"]?"'Receiving Call' <${USER_CALLERID_MAPPING}>")})

