same => n,NoOp(iOS Dial)
same => n(ios),Set(PRESENCE_STATE(CustomPresence:${EXTEN})=available,,)
same => n,AGI(${PUSHKIT_DIR}/pushkit.py, ${DB(SIP/Registry/${EXTEN})})
same => n,Dial(Local/${EXTEN},60,rTt)
same => n,Hangup()
same => n(normal),NoOp(Normal Dial)
same => n,Dial(${LOCAL_EXTENSION},30,rTt)
same => n(hangup),Hangup()

