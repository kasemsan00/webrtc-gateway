[sub-record-check]
;
;overide queue record file name (CALLFILENAME) 
;
exten => recordcheck,19,Set(__CALLFILENAME=${UNIQUEID})

[func-apply-sipheaders]
exten => s,1,Gosub(func-apply-sipheaders-sub,s,1())

[func-apply-sipheaders-sub]
;
; Agent Ringing for queue
;
exten => s,1,Noop(Applying SIP Headers to channel ${CHANNEL})
exten => s,n,GotoIf($["${USER_UNIQUEID}" = ""]?next)
exten => s,n,Set(DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)=${CALLERID(num)})
exten => s,n,Set(DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_name)=${CALLERID(name)})
exten => s,n,Set(DB(VRS_VARIABLE/${USER_UNIQUEID}/STATUSANSWER)=FALSE)
exten => s,n,Gosub(agi-send-event,ring,1())
exten => s,n(next),Return()

[macro-dial-one]
exten => s,53(dialapp),Gosub(macro-dial-one-sub,s,1())
; exten => s,n(dialapp),Noop() ;default

[macro-dial-one-sub]
exten => s,1,Noop()
exten => s,n,NoOp(------------------------ Debug Macro dial one override ------------------------)
exten => s,n,NoOp(${EXTEN})
exten => s,n,NoOp(USER_CALL_TO_TTRS_NUMBER=${USER_CALL_TO_TTRS_NUMBER})
exten => s,n,ExecIf($["${USER_CALL_TO_TTRS_NUMBER}" = "1"]?Set(CHANNEL(musicclass)=call-waiting-classic))
exten => s,n,NoOp(------------------------ Debug Macro dial one override ------------------------)
exten => s,n,Return()

[macro-auto-blkvm]
exten => s,3,Gosub(macro-auto-blkvm-sub,s,1())

[macro-auto-blkvm-sub]
;
; Agent answer from queue
;

exten => s,1,Set(CFIGNORE=) ;default
exten => s,n,GotoIf($["${USER_UNIQUEID}" = ""]?next)
exten => s,n,Set(DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_exten_num)=${CALLERID(num)})
exten => s,n,Set(DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_answer_time)=${EPOCH})
exten => s,n,Set(DB(VRS_VARIABLE/${CALLERID(num)}/user_uniqueid)=${USER_UNIQUEID})
exten => s,n,Set(DB(VRS_VARIABLE/${CALLERID(num)}/user_id)=${USER_ID})
exten => s,n,Set(DB(VRS_VARIABLE/${CALLERID(num)}/user_out_mapping)=${USER_OUT_MAPPING})
exten => s,n,Set(DB(VRS_VARIABLE/${CALLERID(num)}/user_call_type)=${USER_CALL_TYPE})
exten => s,n,Set(DB(VRS_VARIABLE/${CALLERID(num)}/user_source_type)=${USER_SOURCE_TYPE})
exten => s,n,Set(DB(VRS_VARIABLE/${USER_UNIQUEID}/STATUSANSWER)=TRUE)
exten => s,n,Gosub(agi-send-event,answer,1())
exten => s,n(next),Return()

[macro-hangupcall]
; exten => s,4,Gosub(macro-hangupcall-sub,s,1())
exten => s,3(theend),Gosub(macro-hangupcall-sub,s,1())

[macro-hangupcall-sub]
;
; User hangup from queue
;

exten => s,1,NoOp(${USER_ID})
exten => s,n,GotoIf($["${USER_UNIQUEID}" = ""]?nextstep)
exten => s,n,NoOp(${DIALSTATUS})
exten => s,n,GotoIf($["${DIALSTATUS}" = ""]?:continuetoagent)
exten => s,n,NoOp(continuetouser)
exten => s,n,NoOp(queue is abandon : ${ABANDONED})
; exten => s,n,GotoIf($["${CHANNEL(hangupsource)}" = ""]?nextstep)
; exten => s,n,NoOp(${DB(VRS_VARIABLE/${USER_UNIQUEID}/STATUSANSWER)})
exten => s,n,GotoIf($["${DB(VRS_VARIABLE/${USER_UNIQUEID}/STATUSANSWER)}" = "FALSE"]?:check_SetLastCurrentTimeQueueMember)
; exten => s,n,SetLastCurrentTimeQueueMember(,Local/${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)}@from-queue/n)
exten => s,n,Gosub(agi-send-event,queueCallerAbandon,1())
exten => s,n(check_SetLastCurrentTimeQueueMember),GotoIf($["${ABANDONED}" = "TRUE"]?:nextstep)
exten => s,n,GotoIf($["${DB(VRS_VARIABLE/${USER_UNIQUEID}/STATUSANSWER)}" = ""]?nextstep)
exten => s,n,SetLastCurrentTimeQueueMember(,Local/${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)}@from-queue/n)
exten => s,n,Goto(nextstep)
exten => s,n(continuetoagent),NoOp(continuetoagent)
exten => s,n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?:continuetochanunavail)
; exten => s,n,ExecIf($["${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)}" = ""]?SetLastCurrentTimeQueueMember(,Local/${DEVICES}@from-queue/n):SetLastCurrentTimeQueueMember(,Local/${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)}@from-queue/n))
; exten => s,n,SetLastCurrentTimeQueueMember(,Local/${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)}@from-queue/n)
exten => s,n,Gosub(agi-send-event,agentComplete,1())
exten => s,n,Goto(nextstep)
exten => s,n(continuetochanunavail),NoOp(continuetochanunavail)
exten => s,n,GotoIf($["${DIALSTATUS}" = "CHANUNAVAIL"]?:continuetobusy)
exten => s,n,GotoIf($[${QAGENT} = ${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)}]?:nextstep)
exten => s,n,AGI(${VRS_AGI_DIR}/agi_get_detail_queue_log.php,${DB(AMPUSER/${QAGENT}/cidname)})
exten => s,n,GotoIf($[${RINGTIME} > 1000]?:nextstep)
exten => s,n,Gosub(agi-send-event,agentRingNoAnswer,1())
exten => s,n,Goto(nextstep)
exten => s,n(continuetobusy),NoOp(continuetobusy)
exten => s,n,GotoIf($["${DIALSTATUS}" = "BUSY"]?:continuetocancel)
exten => s,n,GotoIf($["${DEXTEN}" != ""]?:nextstep)
exten => s,n,Gosub(agi-send-event,agentRingNoAnswer,1())
exten => s,n,Goto(nextstep)
exten => s,n(continuetocancel),NoOp(continuetocancel)
exten => s,n,GotoIf($["${DIALSTATUS}" = "CANCEL"]?:continuetocongestion)
exten => s,n,AGI(${VRS_AGI_DIR}/agi_get_queue_timeout.php,${NODEST})
exten => s,n,Set(RING_TIME=$[ROUND(${CDR(end,u)}-${CDR(start,u)})])
exten => s,n,NoOp(${QUEUE_TIMEOUT})
exten => s,n,GotoIf($["${QUEUE_TIMEOUT}" = "${RING_TIME}"]?:continuetocongestion)
exten => s,n,Gosub(agi-send-event,agentRingNoAnswer,1())
exten => s,n,Goto(nextstep)
exten => s,n(continuetocongestion),NoOp(continuetocongestion)
exten => s,n,GotoIf($["${DIALSTATUS}" = "CONGESTION"]?:nextstep)
exten => s,n,Gosub(agi-send-event,agentRingNoAnswer,1())
exten => s,n(nextstep),GotoIf($["${USER_UNIQUEID}" != "${UNIQUEID}"]?next)
exten => s,n,Set(USER_QUEUE_TIME=${QUEUEJOINTIME})
exten => s,n,Set(USER_HANGUP_TIME=${EPOCH})
exten => s,n,Set(AGENT_EXTEN=${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_exten_num)})
exten => s,n,Set(AGENT_RING=${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)})
exten => s,n,Set(AGENT_TIME=${DB(VRS_VARIABLE/${USER_UNIQUEID}/agent_answer_time)})
exten => s,n,AGI(${VRS_AGI_DIR}/agi_update_log_service.php,2,${USER_UNIQUEID},${USER_SOURCE_TYPE},${USER_HANGUP_TIME},${USER_QUEUE_TIME},${AGENT_EXTEN},${AGENT_TIME},${REC_STATUS}) 
;Delete Variable DB
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_num)})
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${USER_UNIQUEID}/agent_ring_name)})
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${USER_UNIQUEID}/STATUSANSWER)})
exten => s,n,GotoIf($["${AGENT_EXTEN}" = ""]?next)
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${USER_UNIQUEID}/agent_exten_num)})
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${USER_UNIQUEID}/agent_answer_time)})
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${AGENT_EXTEN}/user_uniqueid)})
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${AGENT_EXTEN}/user_id)})
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${AGENT_EXTEN}/user_out_mapping)})
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${AGENT_EXTEN}/user_call_type)})
exten => s,n,NoOp(${DB_DELETE(VRS_VARIABLE/${AGENT_EXTEN}/user_source_type)})
;Additional return
; same => n(next),Noop(${CDR(dstchannel)} montior file= ${MIXMONITOR_FILENAME}) ;default
same => n(next),ExecIf($["${ONETOUCH_RECFILE}"!="" & "${CDR(recordingfile)}"=""]?Set(CDR(recordingfile)=${ONETOUCH_RECFILE})) ;default
same => n,Return()


[macro-user-callerid]
exten => s,48,Set(CALLERID(name)=${CALLERID(name)})

