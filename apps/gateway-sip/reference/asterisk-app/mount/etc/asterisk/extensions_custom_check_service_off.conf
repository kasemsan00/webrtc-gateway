[vrs-check-17]
exten => s,1,NoOp()
same => n,ExecIf($["${CALLERID(num)}" = "5000059"]?Set(vrsCheck=true))
same => n,Goto(vrs-check-service-off-main-sub,s,check_vrsCheck_17)


[vrs-check-18]
exten => s,1,NoOp()
same => n,ExecIf($["${CALLERID(num)}" = "5000061"]?Set(vrsCheck=true))
same => n,Goto(vrs-check-service-off-main-sub,s,check_vrsCheck_18)


[vrs-check-service-off-main-sub]
;
; VRS service time off
;

exten => s,1,NoOp()
same => n,GotoIfTime(10:00-13:00,*,17,jul?vrs-check-17,s,1)
same => n(check_vrsCheck_17),GotoIf($["${vrsCheck}" = "true"]?end)

same => n,GotoIfTime(10:00-13:00,*,18,jul?vrs-check-18,s,1)
same => n(check_vrsCheck_18),GotoIf($["${vrsCheck}" = "true"]?end)

same => n,Set(service_off_main=vrs-ext-main-service-off,${EXTEN},1)
same => n,Set(service_off_main_repairing=vrs-ext-main-service-off-repairing,${EXTEN},1)

;same => n,GotoIfTime(07:00-23:59,*,13,*?${service_off_main})
same => n,GotoIfTime(*,*,*,*?${service_off_main})
;same => n,GotoIfTime(*,sun,*,may?${service_off_main_repairing})
;same => n,GotoIfTime(00:00-07:00,mon,*,may?${service_off_main_repairing})
;same => n,GotoIfTime(00:00-07:00,*,1,jun?${service_off_main_repairing})

;same => n,GotoIfTime(10:00-14:00,*,22,jan?${service_off_main_repairing})
;same => n,GotoIfTime(23:00-07:00,*,*,*?vrs-ext-main-service-off,${EXTEN},1);;Normal 07:00-23:00
;same => n,GotoIfTime(*,*,*,*?${service_off_main_repairing})
;same => n,GotoIfTime(20:00-07:00,*,*,*?${service_off_main});;Normal 07:00 -20:00
;same => n,GotoIfTime(21:00-23:00,*,*,*?${service_off_main_repairing})
;same => n,GotoIfTime(07:00-14:00,*,29,*?${service_off_main_repairing})
;same => n,GotoIfTime(08:10-08:25,*,*,*?${service_off_main_repairing})
;same => n,GotoIfTime(07:00-22:59,*,5,jan?${service_off_main})
;same => n,GotoIfTime(*,*,*,*?vrs-ext-main-service-off,${EXTEN},1)
;same => n,GotoIfTime(16:00-20:00,*,21,jan?vrs-ext-main-service-off-repairing,${EXTEN},1)
;same => n,GotoIfTime(18:00-23:00,thu,15,apr?vrs-ext-main-service-off,${EXTEN},1)
same => n,Return()
same => n(end),Return()

[vrs-check-service-off-helpdesk-sub]
;
; Help Desk service time off
;

exten => s,1,NoOp()
same => n,Set(service_off_helpdesk=vrs-ext-main-service-off-helpdesk,${EXTEN},1)
same => n,Set(service_off_helpdesk_repairing=vrs-ext-main-service-off-repairing,${EXTEN},1)
same => n,GotoIfTime(17:30-08:30,mon-fri,*,*?vrs-ext-main-service-off-helpdesk,${EXTEN},1)
same => n,GotoIfTime(*,sat-sun,*,*?vrs-ext-main-service-off-helpdesk,${EXTEN},1)

;same => n,GotoIfTime(07:00-23:59,*,13,*?${service_off_helpdesk})
same => n,GotoIfTime(*,*,*,*?${service_off_helpdesk})

;same => n,GotoIfTime(10:00-14:00,*,22,jan?${service_off_helpdesk_repairing})
;same => n,GotoIfTime(23:00-07:00,*,*,*?${service_off_helpdesk})
;same => n,GotoIfTime(21:00-23:00,*,*,*?${service_off_helpdesk})
;same => n,GotoIfTime(*,*,*,*?vrs-ext-main-service-off-repairing,${EXTEN},1)
;same => n,GotoIfTime(07:00-14:00,*,29,*?${service_off_helpdesk_repairing})
;same => n,GotoIfTime(*,*,3-9,oct?${service_off_helpdesk})
;same => n,GotoIfTime(08:10-08:25,*,*,*?${service_off_helpdesk_repairing})
;same => n,GotoIfTime(07:00-22:59,*,5,jan?${service_off_helpdesk})
;same => n,GotoIfTime(18:00-23:00,thu,15,apr?vrs-ext-main-service-off-helpdesk,${EXTEN},1)
same => n,Return()


[vrs-ext-main-service-off]
;
; Service off normal
;
exten => s,1,Answer
same => n,Wait(3)
;same => n,Playback(vrs-ivvr/vrs_service_off)
;same => n,Playback(vrs-ivvr/vrs_service_off_0700_2000)
same => n,Playback(vrs-ivvr/vrs_service_off_no_time)
same => n,wait(1)
same => n,HangUp

[vrs-ext-main-service-off-repairing]
;
; Service off maintenance
;
exten => s,1,Answer
same => n,Wait(3)
same => n,Playback(vrs-ivvr/vrs_service_off_repairing);; ปิดปรับปรุง
;same => n,Playback(vrs-ivvr/vrs_service_off_power_outage);; ไฟดับ
same => n,wait(1)
same => n,HangUp

[vrs-ext-main-service-off-helpdesk]
;
; Service off HelpDesk
;
exten => s,1,Answer
same => n,Wait(3)
same => n,Playback(vrs-ivvr/vrs_service_off_helpdesk)
same => n,wait(1)
same => n,HangUp